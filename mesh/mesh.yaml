default:
  environment:
    STREAMX_BLUEPRINTS_KEY_VALUE_STATE_REPOSITORY_BACKEND: rocksdb
    STREAMX_BLUEPRINTS_KEY_VALUE_STATE_REPOSITORY_ROCKSDB_PATH: /var/lib/rocksdb

descriptors:
  relay:
    type: processing
    containers:
      service:
        incoming:
          events: {}
        outgoing:
          relayed-events: {}

  optimized-images-generator:
    type: processing
    containers:
      processor:
        image: ghcr.io/streamx-com/streamx-blueprints/optimized-images-generator:3.0.17-native
        incoming:
          incoming-assets: {}
        outgoing:
          optimized-assets: {}

  local-references-rewriter:
    type: processing
    volumes:
      rocksdb:
        size: 5Gi
    containers:
      processor:
        image: ghcr.io/streamx-com/streamx-blueprints/local-references-rewriter:3.0.17-native
        incoming:
          incoming-pages: {}
          optimized-assets:
            shared: false
            initState: replay
            enforceMonotonicEventTime: true
        outgoing:
          adjusted-pages: {}
        volumes:
          - rocksdb:/var/lib/rocksdb

  external-references-rewriter:
    type: processing
    containers:
      processor:
        image: ghcr.io/streamx-com/streamx-blueprints/external-references-rewriter:3.0.17-native
        incoming:
          incoming-resources: {}
        outgoing:
          outgoing-resources: {}
          download-requests: {}

  resource-downloader:
    type: processing
    volumes:
      rocksdb:
        size: 5Gi
    containers:
      processor:
        image: ghcr.io/streamx-com/streamx-blueprints/resource-downloader:3.0.17-native
        incoming:
          download-requests: {}
        outgoing:
          downloaded-pages: {}
          downloaded-assets: {}
          downloaded-web-resources: {}
        volumes:
          - rocksdb:/var/lib/rocksdb

  json-aggregator:
    type: processing
    volumes:
      rocksdb:
        size: 5Gi
    containers:
      processor:
        image: ghcr.io/streamx-com/streamx-blueprints/json-aggregator:3.0.17-native
        incoming:
          data: {}
          multivalued-data: {}
        outgoing:
          aggregated-data: {}
          aggregated-multivalued-data: {}
        autoRef:
          - from: data
            to: data-state
            using: sync-state
          - from: multivalued-data
            to: multivalued-data-state
            using: sync-state
        volumes:
          - rocksdb:/var/lib/rocksdb

  event-converter:
    type: processing
    containers:
      processor:
        image: ghcr.io/streamx-com/streamx-blueprints/event-converter:3.0.17-native
        incoming:
          resources: {}
        outgoing:
          indexable-resources: {}

  rendering-engine:
    type: processing
    volumes:
      rocksdb:
        size: 5Gi
    containers:
      processor:
        image: ghcr.io/streamx-com/streamx-blueprints/rendering-engine:3.0.17-native
        incoming:
          data: {}
          renderers: {}
          rendering-contexts: {}
        outgoing:
          pages: {}
          fragments: {}
        autoRef:
          - from: outgoing-rendering-requests
            to: incoming-rendering-requests
            using: internal-relay
          - from: data
            to: data-state
            using: sync-state
          - from: renderers
            to: renderers-state
            using: sync-state
          - from: rendering-contexts
            to: rendering-contexts-state
            using: sync-state
        volumes:
          - rocksdb:/var/lib/rocksdb

  composition-engine:
    type: processing
    volumes:
      rocksdb:
        size: 5Gi
    containers:
      processor:
        image: ghcr.io/streamx-com/streamx-blueprints/composition-engine:3.0.17-native
        incoming:
          layouts: {}
          compositions: {}
        outgoing:
          pages: {}
        autoRef:
          - from: outgoing-page-compose-requests
            to: incoming-page-compose-requests
            using: internal-relay
          - from: layouts
            to: layouts-state
            using: sync-state
          - from: compositions
            to: compositions-state
            using: sync-state
        volumes:
          - rocksdb:/var/lib/rocksdb

  data-collector:
    type: processing
    volumes:
      rocksdb:
        size: 5Gi
    containers:
      processor:
        image: ghcr.io/streamx-com/streamx-blueprints/data-collector:3.0.17-native
        incoming:
          data: {}
        outgoing:
          collected-data: {}
          web-resources: {}
        autoRef:
          - from: data
            to: data-state
            using: sync-state
        volumes:
          - rocksdb:/var/lib/rocksdb

  sitemap-generator:
    type: processing
    volumes:
      rocksdb:
        size: 5Gi
    containers:
      processor:
        image: ghcr.io/streamx-com/streamx-blueprints/sitemap-generator:3.0.17-native
        incoming:
          incoming-pages: {}
        outgoing:
          outgoing-sitemaps: {}
        autoRef:
          - from: incoming-pages
            to: incoming-pages-state
            using: sync-state
        volumes:
          - rocksdb:/var/lib/rocksdb

  indexable-resources-producer:
    type: processing
    containers:
      processor:
        image: ghcr.io/streamx-com/streamx-blueprints/indexable-resources-producer:3.0.17-native
        incoming:
          pages: {}
          fragments: {}
        outgoing:
          indexable-resources: {}
          indexable-resource-fragments: {}

  opensearch-sink:
    type: edge
    volumes:
      opensearch-data:
        size: 20Gi
        persistent: true
      rocksdb:
        size: 20Gi
        persistent: true
    containers:
      sink:
        image: ghcr.io/streamx-com/streamx-blueprints/opensearch-sink:3.0.17-native
        incoming:
          indexable-resources:
            initState: delta
          indexable-resource-fragments:
            initState: delta
        autoRef:
          - from: indexable-resource-fragments
            to: indexable-resource-fragments-state
            using: sync-state
        servicePorts:
          - 8082:8080
        volumes:
          - opensearch-data:/usr/share/opensearch/data
          - rocksdb:/var/lib/rocksdb
        environment:
          QUARKUS_ELASTICSEARCH_HOSTS: ${STREAMX_SERVICE_ID}.opensearch:9201
      opensearch:
        image: registry.prod-ext.streamx.cloud/streamx-docker-hub-public-proxy/opensearchproject/opensearch:2.16.0
        servicePorts:
          - 9201:9201
        volumes:
          - opensearch-data:/usr/share/opensearch/data
        environment:
          network.host: 0.0.0.0
          http.port: "9201"
          discovery.type: single-node
          DISABLE_SECURITY_PLUGIN: "true"

  web-server-sink:
    type: edge
    volumes:
      repository-volume:
        size: 20Gi
        persistent: true
    containers:
      sink:
        image: ghcr.io/streamx-com/streamx-blueprints/web-server-sink:3.0.17-native
        incoming:
          resources:
            initState: delta
        servicePorts:
          - 8083:8080
        volumes:
          - repository-volume:/srv/www
        environment:
          STREAMX_BLUEPRINTS_WEB_SERVER_SINK_STORAGE_ROOT_DIRECTORY: /srv/www
      webserver:
        image: registry.prod-ext.streamx.cloud/streamx-docker-hub-public-proxy/library/nginx:1.26.0
        servicePorts:
          - 8084:80
        volumes:
          - repository-volume:/usr/share/nginx/html

  openai-rag-sink:
    type: edge
    volumes:
      pgvolume:
        size: 20Gi
        persistent: true
    containers:
      sink:
        image: ghcr.io/streamx-hub/streamx-rag-service:1.0.0-jvm
        incoming:
          resources:
            initState: delta
        servicePorts:
          - 8085:8080
      postgres:
        image: pgvector/pgvector:pg17
        servicePorts:
          - 5432:5432
        environment:
          PGDATA: /data/rag-postgres/pgdata
        volumes:
          - pgvolume:/data/rag-postgres

networking:
  httpRoutes:
    ingestion-route:
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - name: ingestion/rest-ingestion
              port: 8080
    web-server-and-search-route:
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /search
          backendRefs:
            - name: edge/search-sink
              port: 8082
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - name: edge/web-server-sink
              port: 8084
    openai-rag-route:
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /api
          backendRefs:
            - name: edge/openai-rag-sink
              port: 8085
sources:
  github:
    outgoing:
      - ref: inbox.pages
        produces:
          - com.streamx.blueprints.page.published.v1
          - com.streamx.blueprints.page.unpublished.v1
      - ref: inbox.fragments
        produces:
          - com.streamx.blueprints.fragment.published.v1
          - com.streamx.blueprints.fragment.unpublished.v1
      - ref: inbox.assets
        produces:
          - com.streamx.blueprints.asset.published.v1
          - com.streamx.blueprints.asset.unpublished.v1
      - ref: inbox.web-resources
        produces:
          - com.streamx.blueprints.web-resource.published.v1
          - com.streamx.blueprints.web-resource.unpublished.v1
      - ref: inbox.data
        produces:
          - com.streamx.blueprints.data.published.v1
          - com.streamx.blueprints.data.unpublished.v1
      - ref: inbox.renderers
        produces:
          - com.streamx.blueprints.renderer.published.v1
          - com.streamx.blueprints.renderer.unpublished.v1
      - ref: inbox.rendering-contexts
        produces:
          - com.streamx.blueprints.rendering-context.published.v1
          - com.streamx.blueprints.rendering-context.unpublished.v1
      - ref: inbox.layouts
        produces:
          - com.streamx.blueprints.layout.published.v1
          - com.streamx.blueprints.layout.unpublished.v1
      - ref: inbox.compositions
        produces:
          - com.streamx.blueprints.composition.published.v1
          - com.streamx.blueprints.composition.unpublished.v1
      - ref: inbox.download-requests
        produces:
          - com.streamx.blueprints.download.schedule.v1
          - com.streamx.blueprints.download.unschedule.v1
  pim:
    outgoing:
      - ref: inbox.data
        produces:
          - com.streamx.blueprints.data.published.v1
          - com.streamx.blueprints.data.unpublished.v1
  cms:
    outgoing:
      - ref: inbox.pages
        produces:
          - com.streamx.blueprints.page.published.v1
          - com.streamx.blueprints.page.unpublished.v1
      - ref: inbox.fragments
        produces:
          - com.streamx.blueprints.fragment.published.v1
          - com.streamx.blueprints.fragment.unpublished.v1
      - ref: inbox.assets
        produces:
          - com.streamx.blueprints.asset.published.v1
          - com.streamx.blueprints.asset.unpublished.v1
      - ref: inbox.web-resources
        produces:
          - com.streamx.blueprints.web-resource.published.v1
          - com.streamx.blueprints.web-resource.unpublished.v1
      - ref: inbox.renderers
        produces:
          - com.streamx.blueprints.renderer.published.v1
          - com.streamx.blueprints.renderer.unpublished.v1
      - ref: inbox.rendering-contexts
        produces:
          - com.streamx.blueprints.rendering-context.published.v1
          - com.streamx.blueprints.rendering-context.unpublished.v1
      - ref: inbox.layouts
        produces:
          - com.streamx.blueprints.layout.published.v1
          - com.streamx.blueprints.layout.unpublished.v1
      - ref: inbox.compositions
        produces:
          - com.streamx.blueprints.composition.published.v1
          - com.streamx.blueprints.composition.unpublished.v1

ingestion:
  rest-ingestion:
    containers:
      proxy:
        environment:
          # Ensures that generated tokens would work between cluster restarts
          STREAMX_SOURCES_GITHUB_ACCEPT_IAT_FROM: "1704067200"
          STREAMX_SOURCES_PIM_ACCEPT_IAT_FROM: "1704067200"
          STREAMX_SOURCES_CMS_ACCEPT_IAT_FROM: "1704067200"
        environmentFrom:
          configs:
            - rest-ingestion.properties

processing:
  assets-relay:
    descriptor: relay
    containers:
      service:
        incoming:
          events:
            ref: inbox.assets,relay.optimized-assets
        outgoing:
          relayed-events:
            ref: outbox.assets

  fragments-relay:
    descriptor: relay
    containers:
      service:
        incoming:
          events:
            ref: inbox.fragments
        outgoing:
          relayed-events:
            ref: relay.fragments

  data-relay:
    descriptor: relay
    containers:
      service:
        incoming:
          events:
            ref: relay.aggregated-data
        outgoing:
          relayed-events:
            ref: outbox.data

  outbox-fragments-relay:
    descriptor: relay
    containers:
      service:
        incoming:
          events:
            ref: relay.fragments
        outgoing:
          relayed-events:
            ref: outbox.fragments

  download-requests-relay:
    descriptor: relay
    containers:
      service:
        incoming:
          events:
            ref: inbox.download-requests
        outgoing:
          relayed-events:
            ref: relay.download-requests

  optimized-images-generator:
    descriptor: optimized-images-generator
    containers:
      processor:
        incoming:
          incoming-assets:
            ref: inbox.assets
        outgoing:
          optimized-assets:
            ref: relay.optimized-assets
        environmentFrom:
          configs:
            - optimized-images-generator.properties

  pages-optimized-img-rewriter:
    descriptor: local-references-rewriter
    containers:
      processor:
        incoming:
          incoming-pages:
            ref: relay.composed-pages
          optimized-assets:
            ref: relay.optimized-assets
        outgoing:
          adjusted-pages:
            ref: outbox.pages
        environmentFrom:
          configs:
            - pages-optimized-img-rewriter.properties

  eds-pages-ext-ref-rewriter:
    descriptor: external-references-rewriter
    containers:
      processor:
        incoming:
          incoming-resources:
            ref: inbox.pages
        outgoing:
          outgoing-resources:
            ref: relay.composed-pages
          download-requests:
            ref: relay.download-requests
        environmentFrom:
          configs:
            - external-references-rewriter.pages.properties

  eds-web-resources-ext-ref-rewriter:
    descriptor: external-references-rewriter
    containers:
      processor:
        incoming:
          incoming-resources:
            ref: inbox.web-resources
        outgoing:
          outgoing-resources:
            ref: outbox.web-resources
          download-requests:
            ref: relay.download-requests
        environmentFrom:
          configs:
            - external-references-rewriter.web-resources.properties

  commerce-data-ext-ref-rewriter:
    descriptor: external-references-rewriter
    containers:
      processor:
        incoming:
          incoming-resources:
            ref: inbox.data
        outgoing:
          outgoing-resources:
            ref: relay.data
          download-requests:
            ref: relay.download-requests
        environmentFrom:
          configs:
            - external-references-rewriter.data.properties

  resource-downloader:
    descriptor: resource-downloader
    containers:
      processor:
        incoming:
          download-requests:
            ref: relay.download-requests
        outgoing:
          downloaded-pages:
            ref: inbox.pages
          downloaded-assets:
            ref: inbox.assets
          downloaded-web-resources:
            ref: inbox.web-resources

  json-aggregator:
    descriptor: json-aggregator
    containers:
      processor:
        incoming:
          data:
            ref: relay.data
          multivalued-data:
            ref: relay.data
        outgoing:
          aggregated-data:
            ref: relay.aggregated-data
          aggregated-multivalued-data:
            ref: inbox.data
        environmentFrom:
          configs:
            - json-aggregator.properties

  event-converter:
    descriptor: event-converter
    containers:
      processor:
        incoming:
          resources:
            ref: relay.aggregated-data
        outgoing:
          indexable-resources:
            ref: outbox.indexable-resources

  rendering-engine:
    descriptor: rendering-engine
    containers:
      processor:
        incoming:
          data:
            ref: relay.aggregated-data,relay.collected-data
          renderers:
            ref: inbox.renderers
          rendering-contexts:
            ref: inbox.rendering-contexts
        outgoing:
          pages:
            ref: relay.composed-pages
          fragments:
            ref: relay.fragments

  composition-engine:
    descriptor: composition-engine
    containers:
      processor:
        incoming:
          layouts:
            ref: inbox.layouts
          compositions:
            ref: inbox.compositions
        outgoing:
          pages:
            ref: relay.composed-pages

  data-collector:
    descriptor: data-collector
    containers:
      processor:
        incoming:
          data:
            ref: relay.aggregated-data,relay.collected-data
        outgoing:
          collected-data:
            ref: relay.collected-data
          web-resources:
            ref: outbox.web-resources
        environmentFrom:
          configs:
            - data-collector.properties

  sitemap-generator:
    descriptor: sitemap-generator
    containers:
      processor:
        incoming:
          incoming-pages:
            ref: relay.composed-pages
        outgoing:
          outgoing-sitemaps:
            ref: outbox.web-resources
        environmentFrom:
          configs:
            - sitemap-generator.properties

  indexable-resources-producer:
    descriptor: indexable-resources-producer
    containers:
      processor:
        incoming:
          pages:
            ref: relay.composed-pages
          fragments:
            ref: relay.fragments
        outgoing:
          indexable-resources:
            ref: outbox.indexable-resources
          indexable-resource-fragments:
            ref: outbox.indexable-resource-fragments
        environmentFrom:
          configs:
            - indexable-resources-producer.properties

edge:
  search-sink:
    descriptor: opensearch-sink
    containers:
      sink:
        incoming:
          indexable-resources:
            ref: outbox.indexable-resources
          indexable-resource-fragments:
            ref: outbox.indexable-resource-fragments
        volumesFrom:
          configs:
            - opensearch/service-init:/deployments/opensearch/service-init/additional
        environmentFrom:
          secrets:
            - encrypted/search-sink.properties

      opensearch:
        environmentFrom:
          secrets:
            - encrypted/search-sink-opensearch.properties

  web-server-sink:
    descriptor: web-server-sink
    containers:
      sink:
        incoming:
          resources:
            ref: outbox.pages,outbox.fragments,outbox.assets,outbox.web-resources
        environmentFrom:
          configs:
            - web-server-sink.properties

      webserver:
        volumesFrom:
          configs:
            - nginx_conf/nginx.conf:/etc/nginx/conf.d/default.conf

  openai-rag-sink:
    descriptor: openai-rag-sink
    containers:
      sink:
        incoming:
          resources:
            ref: outbox.data
        environment:
          QUARKUS_LOG_LEVEL: TRACE
          QUARKUS_LOG_MIN_LEVEL: TRACE
          STREAMX_POSTGRES_URL: jdbc:postgresql://sx-${STREAMX_SERVICE_ID}.postgres:5432/ragdb
        environmentFrom:
          secrets:
            - encrypted/open-ai-rag.properties
          configs:
            - open-ai-rag.properties
      postgres:
        environmentFrom:
          secrets:
            - encrypted/postgres.properties
        volumesFrom:
          configs:
            - postgres/init.sql:/docker-entrypoint-initdb.d/init.sql